<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SavorQuest Corporation</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f4f6fb;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    max-width: 400px;
    width: 100%;
    padding: 2rem 1.5rem 2rem;
    text-align: center;
    box-shadow: 0 4px 32px rgba(26,47,90,0.10);
  }
  .logo-wrap {
    width: 90px; height: 90px;
    border-radius: 50%;
    background: #1A2F5A;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 0.9rem;
    border: 3px solid #D4A017;
  }
  .logo-wrap span { color: #D4A017; font-size: 24px; font-weight: 700; letter-spacing: 1.5px; }
  .biz-name { font-size: 19px; font-weight: 700; color: #1A2F5A; margin-bottom: 3px; }
  .tagline { font-size: 11.5px; color: #888; margin-bottom: 4px; }
  .certs { font-size: 10.5px; color: #aaa; margin-bottom: 1.4rem; }
  .section-label { font-size: 10.5px; font-weight: 600; color: #aaa; letter-spacing: 1.2px; text-transform: uppercase; text-align: left; margin: 1.1rem 0 0.5rem; }
  .btn-grid { display: grid; gap: 9px; }
  .btn-grid.two { grid-template-columns: 1fr 1fr; }
  .btn-grid.one { grid-template-columns: 1fr; }
  .btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 13px 10px; border-radius: 11px; font-size: 14px; font-weight: 600; text-decoration: none; border: none; cursor: pointer; transition: filter 0.15s, transform 0.1s; }
  .btn:hover { filter: brightness(0.92); }
  .btn:active { transform: scale(0.97); }
  .btn svg { flex-shrink: 0; }
  .btn-call  { background: #1A2F5A; color: #D4A017; }
  .btn-viber { background: #7360F2; color: #fff; }
  .btn-wa    { background: #25D366; color: #fff; }
  .btn-fb    { background: #1877F2; color: #fff; }
  .btn-ig    { background: #E1306C; color: #fff; }
  .btn-email { background: #D4A017; color: #1A2F5A; }
  .divider { height: 1px; background: #eee; margin: 1.3rem 0 0; }
  .footer { font-size: 10.5px; color: #ccc; margin-top: 1.1rem; }
</style>
</head>
<body>
<div class="card">

      Facebook

      WhatsApp
    </a>
  </div>
  <p class="section-label">Call us</p>
  <div class="btn-grid one">
    <a class="btn btn-call" href="tel:+639173219443">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.4 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.77a16 16 0 0 0 6.29 6.29l1.62-.89a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      0917 321 9443

  </div>

    <a class="btn btn-email" href="mailto:sales@savorquestcorp.com">

</body>
</html>
